<!DOCTYPE html>
<html lang="zh-CN">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>控制台 - yuhai</title>
  <link rel="icon" type="image/svg+xml" href="/assets/app.svg" />
  <link rel="icon" type="image/x-icon" href="/assets/app.ico" />
  
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;600;700;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />

  <style>
    /* Console Specific Styles */
    body {
      background: var(--bg-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .console-main {
      flex: 1;
      padding: calc(var(--nav-h) + 60px) 24px 100px;
      max-width: 1100px;
      margin: 0 auto;
      width: 100%;
    }

    .console-header {
      margin-bottom: 40px;
    }

    .console-title {
      font-size: 32px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: -0.02em;
    }

    .console-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 32px;
    }

    .console-card {
      position: relative;
      background: var(--bg-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 32px;
      transition: all var(--transition-base);
      overflow: hidden;
    }

    .console-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0));
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      opacity: 0.5;
    }

    .console-card:hover {
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5), inset 0 0 0 1px rgba(139, 92, 246, 0.2);
      transform: translateY(-4px);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .card-icon {
      display: flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      border-radius: 8px;
      background: rgba(139, 92, 246, 0.1);
      color: #a78bfa;
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .card-divider {
      height: 1px;
      background: linear-gradient(90deg, var(--border), transparent);
      margin: 0 0 24px 0;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .info-label {
      color: var(--text-secondary);
      font-size: 15px;
      font-weight: 500;
    }

    .tag {
      display: inline-flex;
      align-items: center;
      padding: 4px 12px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.05em;
    }

    .tag-green {
      background: rgba(16, 185, 129, 0.1);
      color: #34d399;
      border: 1px solid rgba(16, 185, 129, 0.2);
      box-shadow: 0 0 10px rgba(16, 185, 129, 0.1);
    }

    .tag-blue {
      background: rgba(59, 130, 246, 0.1);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.2);
      box-shadow: 0 0 10px rgba(59, 130, 246, 0.1);
    }

    .vip-section {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 32px;
      padding-top: 24px;
      border-top: 1px dashed var(--border);
    }

    .vip-status {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--text-primary);
      font-weight: 600;
      font-size: 15px;
    }

    .btn-vip {
      background: linear-gradient(135deg, #f59e0b, #d97706);
      color: #fff;
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 13px;
      font-weight: 700;
      border: none;
      box-shadow: 0 4px 15px rgba(245, 158, 11, 0.3);
      cursor: pointer;
      transition: all var(--transition-base);
    }

    .btn-vip:hover {
      box-shadow: 0 8px 25px rgba(245, 158, 11, 0.5);
      transform: translateY(-2px);
    }

    .api-key-status {
      margin-bottom: 24px;
    }

    .api-key-status .label {
      display: block;
      color: var(--text-primary);
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .api-key-status .value {
      display: block;
      color: var(--text-secondary);
      font-size: 14px;
    }
    
    .api-key-display {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(0,0,0,0.3);
      border: 1px solid var(--border);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 24px;
      font-family: var(--font-mono);
      font-size: 14px;
      color: var(--text-primary);
    }

    .btn-generate {
      width: 100%;
      background: linear-gradient(135deg, #ef4444, #b91c1c); /* Reddish gradient as requested */
      color: #fff;
      padding: 14px;
      border-radius: var(--radius-sm);
      border: none;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(239, 68, 68, 0.3);
      transition: all var(--transition-base);
    }

    .btn-generate:hover {
      box-shadow: 0 8px 30px rgba(239, 68, 68, 0.5);
      transform: translateY(-2px);
    }

    .api-notice {
      margin-top: 16px;
      font-size: 12px;
      color: var(--text-tertiary);
      line-height: 1.6;
    }

    /* API Key List Container - Scrollable */
    .api-key-list-container {
      max-height: 280px;
      overflow-y: auto;
      margin-bottom: 20px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid rgba(139, 92, 246, 0.15);
      padding: 8px;
    }

    .api-key-list-container::-webkit-scrollbar {
      width: 6px;
    }

    .api-key-list-container::-webkit-scrollbar-track {
      background: transparent;
      border-radius: 10px;
    }

    .api-key-list-container::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, #8b5cf6, #a78bfa);
      border-radius: 10px;
      transition: all 0.2s;
    }

    .api-key-list-container::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, #7c3aed, #8b5cf6);
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
    }

    .api-key-item {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 16px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, rgba(30, 41, 59, 0.8), rgba(15, 23, 42, 0.9));
      border: 1px solid rgba(139, 92, 246, 0.1);
      border-radius: 10px;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
    }

    .api-key-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, #8b5cf6, transparent);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .api-key-item:hover {
      transform: translateX(4px);
      border-color: rgba(139, 92, 246, 0.3);
      box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15), inset 0 0 20px rgba(139, 92, 246, 0.05);
    }

    .api-key-item:hover::before {
      opacity: 1;
    }

    .api-key-item:last-child {
      margin-bottom: 0;
    }

    .api-key-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .api-key-name {
      font-size: 15px;
      font-weight: 700;
      color: #e2e8f0;
      font-family: var(--font-mono);
    }

    .api-key-actions {
      display: flex;
      gap: 8px;
      flex-shrink: 0;
    }

    .btn-action {
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      border: none;
    }

    .btn-copy {
      background: rgba(59, 130, 246, 0.15);
      color: #60a5fa;
      border: 1px solid rgba(59, 130, 246, 0.25);
    }

    .btn-copy:hover {
      background: rgba(59, 130, 246, 0.25);
      box-shadow: 0 2px 10px rgba(59, 130, 246, 0.3);
      transform: translateY(-1px);
    }

    .btn-delete {
      background: rgba(239, 68, 68, 0.15);
      color: #f87171;
      border: 1px solid rgba(239, 68, 68, 0.25);
    }

    .btn-delete:hover {
      background: rgba(239, 68, 68, 0.25);
      box-shadow: 0 2px 10px rgba(239, 68, 68, 0.3);
      transform: translateY(-1px);
    }

    .api-key-value-display {
      font-family: var(--font-mono);
      font-size: 13px;
      color: #94a3b8;
      word-break: break-all;
      padding: 8px 0 4px 0;
    }

    .api-key-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 12px;
      color: #64748b;
      padding-top: 8px;
      border-top: 1px solid rgba(148, 163, 184, 0.1);
    }

    @media (max-width: 768px) {
      .console-grid {
        grid-template-columns: 1fr;
      }
    }
    
    /* Loading state */
    .loading-overlay {
      position: fixed; inset: 0; background: var(--bg-primary);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; transition: opacity 0.3s;
    }
    .spinner {
      width: 40px; height: 40px; border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8b5cf6; border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { 100% { transform: rotate(360deg); } }
  </style>
</head>

<body>

  <div id="loading" class="loading-overlay">
    <div class="spinner"></div>
  </div>

  <!-- NAV -->
  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="/index.html" class="nav-logo">
        <span class="logo-icon">🌊</span>
        <span class="logo-text">yuhai</span>
      </a>
      <div class="nav-links">
        <a href="/index.html" class="nav-link">首页</a>
      </div>
      <div class="nav-actions">
        <div id="app-auth" style="display: flex; align-items: center; margin-left: 4px; margin-right: 4px;"></div>
      </div>
      <button class="nav-toggle" id="navToggle" aria-label="Toggle navigation">
        <span></span><span></span><span></span>
      </button>
    </div>
  </nav>

  <!-- MAIN CONSOLE -->
  <main class="console-main">
    <div class="console-header">
      <h1 class="console-title">用户控制台</h1>
    </div>

    <div class="console-grid">
      <!-- 1. 基本信息 Card -->
      <div class="console-card">
        <div class="card-header">
          <div class="card-icon" style="color:#60a5fa; background:rgba(59,130,246,0.1);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
              <circle cx="12" cy="7" r="4"></circle>
            </svg>
          </div>
          <h2 class="card-title">基本信息</h2>
        </div>
        <div class="card-divider"></div>

        <div class="info-row">
          <span class="info-label">账户状态</span>
          <span class="tag tag-green">已激活</span>
        </div>
        <div class="info-row">
          <span class="info-label">认证信息</span>
          <span class="tag tag-blue">个人认证</span>
        </div>

        <div class="vip-section">
          <div class="vip-status">
            <span>👑</span> 普通用户
          </div>

            ✨ 升级 VIP
          </button>

      <!-- 2. API Key Management Card -->
      <div class="console-card">
        <div class="card-header">
          <div class="card-icon" style="color:#ef4444; background:rgba(239,68,68,0.1);">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M2 18v3c0 .6.4 1 1 1h4v-3h3v-3h2l1.4-1.4a6.5 6.5 0 1 0-4-4Z"></path>
              <circle cx="16.5" cy="7.5" r=".5" fill="currentColor"></circle>
            </svg>
          </div>
          <h2 class="card-title">API Key 管理</h2>
        </div>
        <div class="card-divider"></div>

        <div class="api-key-status">
          <span class="label">当前 Key 状态</span>

          <!-- API Key items will be dynamically inserted here -->
        </div>

        <div id="apiKeyDisplayContainer" style="display: none;">
          <div class="api-key-display">
            <span id="apiKeyValue">sk-*******************</span>
            <button id="copyKeyBtn" style="color:#94a3b8; transition:color 0.2s;" title="复制API Key">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
                <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
              </svg>
            </button>

        <button class="btn-generate" id="generateKeyBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21.5 2v6h-6M21.34 15.57a10 10 0 1 1-.92-10.27l-3.27-3.27"></path>
          </svg>
          <span id="generateBtnText">创建新 Key</span>
        </button>

        <p class="api-notice">注意：Key 用于鉴权，请妥善保管。如果丢失则无法找回，只能重新生成新 Key 覆盖旧的。</p>

  <!-- FOOTER -->
  <footer class="footer" style="padding: 40px 0;">
    <div class="container" style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px;">
      <p style="color:var(--text-tertiary); font-size:14px;">&copy; 2026 yuhai AI. 仅供学习研究使用。</p>
      <div style="display:flex; gap:20px; font-size:14px; color:var(--text-secondary);">
        <a href="#" style="transition:color 0.2s;">隐私政策</a>
        <a href="#" style="transition:color 0.2s;">用户协议</a>
      </div>
    </div>
  </footer>

  <script>
    // Console UI Logic
    document.addEventListener('DOMContentLoaded', () => {
      const generateKeyBtn = document.getElementById('generateKeyBtn');
      const apiKeyStatus = document.getElementById('apiKeyStatus');
      const apiKeyDisplayContainer = document.getElementById('apiKeyDisplayContainer');
      const apiKeyValue = document.getElementById('apiKeyValue');
      const generateBtnText = document.getElementById('generateBtnText');
      const copyKeyBtn = document.getElementById('copyKeyBtn');

      let currentKey = null;

      function generateUUID() {
        return 'sk-yh-' + Math.random().toString(36).substring(2, 10) + Math.random().toString(36).substring(2, 10);
      }

      let apiKeys = [];

      async function fetchApiKeys() {
        try {
          const response = await fetch('/api/api-keys');
          const result = await response.json();
          
          if (result.success && result.data.keys) {
            apiKeys = result.data.keys.map(key => ({
              id: key.id,
              name: key.name,
              key: `${key.prefix}****`,  // 只显示前缀
              prefix: key.prefix,
              createdAt: new Date(key.createdAt).toLocaleDateString('zh-CN'),
              usage: key.usage?.total || 0,
              lastUsed: key.usage?.lastUsed || null
            }));
            renderApiKeyList();
          }
        } catch (error) {
          console.error('Failed to fetch API keys:', error);
        }
      }

      function renderApiKeyList() {
        const container = document.getElementById('apiKeyListContainer');
        
        if (apiKeys.length === 0) {
          container.style.display = 'none';
          apiKeyDisplayContainer.style.display = 'none';
          apiKeyStatus.innerText = '尚未生成 Key';
          return;
        }

        container.style.display = 'block';
        apiKeyDisplayContainer.style.display = 'none';
        apiKeyStatus.innerText = `已生成 ${apiKeys.length} 个 Key`;

        container.innerHTML = apiKeys.map((keyObj, index) => `
          <div class="api-key-item" data-index="${index}" data-id="${keyObj.id}">
            <div class="api-key-item-header">
              <span class="api-key-name">${keyObj.name}</span>
              <div class="api-key-actions">
                <button class="btn-action btn-copy" onclick="copyApiKey(${index})">复制</button>
                <button class="btn-action btn-delete" onclick="deleteApiKey(${index})">删除</button>
              </div>
            </div>
            <div class="api-key-value-display">${keyObj.key}</div>
            <div class="api-key-meta">
              <span>创建于 ${keyObj.createdAt}</span>
              <span>使用 ${keyObj.usage} 次</span>
            </div>
          </div>
        `).join('');
      }

      window.copyApiKey = function(index) {
        const keyData = apiKeys[index];
        navigator.clipboard.writeText(keyData.key);
        const btn = document.querySelector(`[data-index="${index}"] .btn-copy`);
        btn.innerText = '已复制!';
        btn.style.background = 'rgba(16, 185, 129, 0.25)';
        btn.style.color = '#34d399';
        setTimeout(() => {
          btn.innerText = '复制';
          btn.style.background = '';
          btn.style.color = '';
        }, 2000);
      };

      window.deleteApiKey = async function(index) {
        const keyId = apiKeys[index].id;
        
        if (!confirm('确定要删除这个 API Key 吗？此操作不可恢复！')) {
          return;
        }

        try {
          const response = await fetch(`/api/api-keys-manage?id=${keyId}`, {
            method: 'DELETE'
          });
          
          const result = await response.json();
          
          if (result.success) {
            apiKeys.splice(index, 1);
            renderApiKeyList();
            alert(result.message || '删除成功！');
          } else {
            alert('删除失败：' + (result.error || '未知错误'));
          }
        } catch (error) {
          console.error('Delete error:', error);
          alert('删除失败，请重试');
        }
      };

      generateKeyBtn.addEventListener('click', async () => {
        const keyName = prompt('请输入 API Key 名称：', `key_${Math.random().toString(36).substring(2, 6)}`);
        
        if (!keyName || keyName.trim().length === 0) {
          alert('名称不能为空');
          return;
        }

        generateKeyBtn.style.opacity = '0.7';
        generateKeyBtn.style.pointerEvents = 'none';
        generateBtnText.innerText = '创建中...';

        try {
          const response = await fetch('/api/api-keys', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ name: keyName.trim() })
          });

          const result = await response.json();

          if (result.success && result.data) {
            alert(`API Key 创建成功！\n\n请立即保存您的 Key：\n${result.data.key}\n\n${result.data.message}`);
            
            await fetchApiKeys(); // 刷新列表
            
            generateBtnText.innerText = '创建新 Key';
          } else {
            alert('创建失败：' + (result.error || result.message || '未知错误'));
            generateBtnText.innerText = '创建新 Key';
          }
          
          generateKeyBtn.style.opacity = '1';
          generateKeyBtn.style.pointerEvents = 'auto';

        } catch (error) {
          console.error('Create key error:', error);
          alert('创建失败，请重试');
          generateBtnText.innerText = '创建新 Key';
          generateKeyBtn.style.opacity = '1';
          generateKeyBtn.style.pointerEvents = 'auto';
        }
      });

      // 页面加载时获取用户的 API Keys
      fetchApiKeys();
    });

    const generateApiKeyBtn = document.getElementById('generateKeyBtn'); // For pointer events override
  </script>

  <!-- 全局配置文件 -->
  <script src="/config.js"></script>

  <!-- Clerk SDK（通过配置文件动态加载） -->
  <script>
    // 动态加载 Clerk SDK 并初始化
    (function() {
      const config = window.APP_CONFIG || {};
      const publishableKey = config.clerk?.publishableKey || 'pk_test_dGlkeS1maXNoLTU4LmNsZXJrLmFjY291bnRzLmRldiQ';
      const clerkUrl = config.clerk?.cdnUrl || 'https://cdn.jsdelivr.net/npm/@clerk/clerk-js@5/dist/clerk.browser.js';

      // 动态创建脚本标签
      const script = document.createElement('script');
      script.src = clerkUrl;
      script.setAttribute('data-clerk-publishable-key', publishableKey);
      script.async = true;

      // Clerk 加载完成后调用 initClerk
      script.onload = function() {
        if (typeof initClerk === 'function') {
          initClerk();
        }
      };

      document.head.appendChild(script);
    })();
  </script>

  <script>
    // 初始化 Clerk（使用配置文件中的 key）
    const initClerk = async () => {
      const Clerk = window.Clerk;

      try {
        await Clerk.load({
          appearance: {
            variables: {
              colorPrimary: '#8b5cf6',
              colorBackground: '#ffffff',
              colorText: '#1e293b',
              colorInputBackground: '#f8fafc',
              colorInputText: '#1e293b',
              borderRadius: '8px',
            },
            elements: { footerAction: 'display: none' },
            branding: { logo: '/assets/app.svg', name: 'yuhai', withLoader: true },
          }
        });

        // 统一的 UI 更新函数
        function updateAuthUI() {
          const authContainer = document.getElementById('app-auth');
          const user = Clerk.user;

          if (user) {
            const avatarUrl = user.imageUrl || '/assets/app.svg';
            const userName = user.fullName || user.firstName || user.emailAddresses[0]?.emailAddress || '用户';

            authContainer.innerHTML = `
              <div class="user-info" style="display: flex; align-items: center; gap: 8px; padding: 6px 12px; background: rgba(139, 92, 246, 0.08); border-radius: 8px; border: 1px solid rgba(139, 92, 246, 0.2); backdrop-filter: blur(10px);">
                <img src="${avatarUrl}" alt="${userName}" style="width: 28px; height: 28px; border-radius: 50%; object-fit: cover;">
                <div style="display: flex; flex-direction: column; gap: 0px;">
                  <span style="font-size: 13px; font-weight: 600; color: var(--text-primary);">${userName}</span>
                </div>
                <button id="logoutBtnConsole" style="margin-left: 8px; padding: 4px 10px; background: rgba(239, 68, 68, 0.1); color: #ef4444; border: 1px solid rgba(239, 68, 68, 0.2); border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; transition: all 0.2s;" onmouseover="this.style.background='rgba(239, 68, 68, 0.2)'" onmouseout="this.style.background='rgba(239, 68, 68, 0.1)'">退出</button>
              </div>
            `;

            document.getElementById('logoutBtnConsole').addEventListener('click', async () => {
              await Clerk.signOut();
              window.location.href = '/index.html';
            });
          } else {
            window.location.href = '/index.html';
          }
        }

        // 初始化时更新 UI
        updateAuthUI();

        // 监听 Clerk 状态变化，自动更新 UI
        Clerk.addListener(({ user }) => {
          console.log('Clerk 状态变化:', user ? `用户已登录: ${user.emailAddresses[0]?.emailAddress}` : '用户已退出');
          updateAuthUI();
        });

      } catch (err) {
        console.error('Clerk Initialization Error: ', err);
      } finally {
        document.getElementById('loading').style.opacity = '0';
        setTimeout(() => document.getElementById('loading').style.display = 'none', 300);
      }
    };
  </script>
</body>

</html>
