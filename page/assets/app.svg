<?xml version="1.0" encoding="UTF-8"?>
<svg width="256" height="256" viewBox="0 0 256 256" xmlns="http://www.w3.org/2000/svg">
  <!-- 背景圆形 -->
  <circle cx="128" cy="128" r="120" fill="#FF6B6B" stroke="#E55555" stroke-width="4"/>
  
  <!-- 红薯形状 -->
  <ellipse cx="128" cy="140" rx="80" ry="60" fill="#FF8E53" transform="rotate(-15 128 140)"/>
  <ellipse cx="128" cy="140" rx="70" ry="50" fill="#FFA726" transform="rotate(-15 128 140)"/>
  
  <!-- 红薯上的小点 -->
  <circle cx="110" cy="125" r="3" fill="#E55555"/>
  <circle cx="135" cy="135" r="2" fill="#E55555"/>
  <circle cx="120" cy="150" r="2.5" fill="#E55555"/>
  <circle cx="145" cy="145" r="2" fill="#E55555"/>
  
  <!-- 红薯叶子 -->
  <path d="M 140 100 Q 150 90 160 95 Q 155 105 145 110 Z" fill="#4CAF50"/>
  <path d="M 145 95 Q 155 85 165 90 Q 160 100 150 105 Z" fill="#66BB6A"/>
  
  <!-- 文字 "薯" -->
  <text x="128" y="200" font-family="Microsoft YaHei, SimHei, sans-serif" font-size="32" font-weight="bold" text-anchor="middle" fill="white">薯</text>
  
  <!-- 光泽效果 -->
  <ellipse cx="110" cy="110" rx="25" ry="15" fill="rgba(255,255,255,0.3)" transform="rotate(-15 110 110)"/>
</svg>